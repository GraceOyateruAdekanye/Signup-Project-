<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login form">
            <h1>Welcome Back to the Groove</h1>
            <h2>Ready to continue your disco adventure?</h2>
            <p>Log in to your account and keep the rhythm going!</p>
            <form>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <button type="submit">Log In</button>
            </form>

            <div class="login-link">
                <p>Don't have an account? <a href="index.html">Sign up here</a></p>
            </div>
        </div>
        <div class="dance">
            <img src="./gift-habeshaw-Etxf65FaTrs-unsplash.jpg" alt="Log In Image">
        </div>
    </div>

    <script>
        // Simulate login verification using localStorage (since we can't access FormSubmit data)
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Check if user data exists in localStorage (simulating signup data)
            const storedUsers = JSON.parse(localStorage.getItem('prankUsers') || '[]');
            const user = storedUsers.find(u => u.email === email && u.password === password);

            if (user) {
                // "Successful" login - redirect to prank page with user info
                window.location.href = `home.html?email=${encodeURIComponent(email)}`;
            } else {
                alert('❌ Invalid email or password! Did you sign up first? 🤔\n\n(Hint: Try signing up on the main page first!)');
            }
        });
    </script>
</body>
</html
